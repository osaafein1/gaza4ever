kind = "web"
previewPath = "/"
title = "Gaza Forever"
version = "1.0.0"
id = "artifacts/gaza-forever"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19294

[services.development]
run = "pnpm --filter @workspace/gaza-forever run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gaza-forever", "run", "build" ]
publicDir = "artifacts/gaza-forever/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19294"
BASE_PATH = "/"
